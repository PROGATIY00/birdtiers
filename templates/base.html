<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}MagmaTIERS{% endblock %}</title>
<meta http-equiv="refresh" content="300">
<link rel="stylesheet" href="/static/style.css">
{% block extra_head %}{% endblock %}
</head><body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
    <div class="sidebar-logo">Magma<span>TIERS</span></div>
    <a href="/" class="{% if not m %}active{% endif %}" onclick="toggleSidebar()">Global</a>
    {% for gm in modes %}<a href="/?mode={{gm}}" class="{% if m == gm %}active{% endif %}" onclick="toggleSidebar()">{{gm}}</a>{% endfor %}
    <div style="flex:1;"></div>
    <div class="s-label">Quick Links</div>
    <a href="/partner" class="sb-btn orange" onclick="toggleSidebar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Partner
    </a>
    <a href="https://dsc.gg/magmatiers" target="_blank" class="sb-btn blue" onclick="toggleSidebar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4.5a19.8 19.8 0 0 0-4-1.5l-.2.4a18.5 18.5 0 0 0-5.6 0l-.2-.4a19.8 19.8 0 0 0-4 1.5C2 8 1.5 11.5 1.7 15c1.2.9 2.4 1.5 3.7 2l.5-.7c-.5-.2-1-.5-1.5-.9l.4-.3c2.7 1.3 5.6 1.3 8.3 0l.4.3c-.5.4-1 .7-1.5.9l.5.7c1.3-.5 2.5-1.1 3.7-2 .2-3.5-.3-7-2.1-10.5ZM8.5 14.4c-1 0-1.8-.9-1.8-2s.8-2 1.8-2 1.8.9 1.8 2-.8 2-1.8 2Zm7 0c-1 0-1.8-.9-1.8-2s.8-2 1.8-2 1.8.9 1.8 2-.8 2-1.8 2Z"/></svg>
        Discord
    </a>
    <a href="/queue-status" class="sb-btn dark" onclick="toggleSidebar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>
        Live Queue
    </a>
</div>
<div class="header">
    <div style="display:flex;align-items:center;gap:8px;">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <a href="/" style="color:white;text-decoration:none;font-weight:800;font-size:1.6rem;">Magma<span style="color:var(--accent);">TIERS</span></a>
    </div>
    <div class="nav-links">
        <a href="/" class="{% if not m %}active{% endif %}">Global</a>
        {% for gm in modes %}<a href="/?mode={{gm}}" class="{% if m == gm %}active{% endif %}">{{gm}}</a>{% endfor %}
        <a href="/partner">Partner</a>
    </div>
    <button class="discord hide-mobile" aria-label="Discord" title="Discord" onclick='window.location.href="https://magmatiers.onrender.com/discord"'>
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="#ffffff"><path d="M20 4.5a19.8 19.8 0 0 0-4-1.5l-.2.4a18.5 18.5 0 0 0-5.6 0l-.2-.4a19.8 19.8 0 0 0-4 1.5C2 8 1.5 11.5 1.7 15c1.2.9 2.4 1.5 3.7 2l.5-.7c-.5-.2-1-.5-1.5-.9l.4-.3c2.7 1.3 5.6 1.3 8.3 0l.4.3c-.5.4-1 .7-1.5.9l.5.7c1.3-.5 2.5-1.1 3.7-2 .2-3.5-.3-7-2.1-10.5ZM8.5 14.4c-1 0-1.8-.9-1.8-2s.8-2 1.8-2 1.8.9 1.8 2-.8 2-1.8 2Zm7 0c-1 0-1.8-.9-1.8-2s.8-2 1.8-2 1.8.9 1.8 2-.8 2-1.8 2Z"/></svg>
    </button>
    <form action="/" style="margin:0;"><input name="search" placeholder="Search..."></form>
</div>
<div id="ad-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#1a1e29;border-top:2px solid var(--accent);padding:10px 20px;z-index:500;font-size:0.9rem;">
    <div style="max-width:1000px;margin:0 auto;display:flex;align-items:center;gap:16px;">
        <span style="color:var(--accent);font-weight:800;font-size:0.75rem;text-transform:uppercase;white-space:nowrap;">Sponsored</span>
        <div style="flex:1;overflow:hidden;" id="ad-content"></div>
        <button onclick="this.parentElement.parentElement.style.display='none'" style="background:none;border:none;color:#525768;cursor:pointer;font-size:1.2rem;">✕</button>
    </div>
</div>
<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
}
function fetchAd() {
    fetch('/api/ads')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var banner = document.getElementById('ad-banner');
            var content = document.getElementById('ad-content');
            if (data.ad) {
                var html = '<strong style="color:#f0f2f5;">' + data.ad.title + '</strong>'
                    + '<span style="color:#9ba3af;margin:0 8px;">—</span>'
                    + '<span style="color:#9ba3af;">' + data.ad.description.slice(0, 120) + '</span>';
                if (data.ad.proof) {
                    html += ' <a href="' + data.ad.proof + '" target="_blank" style="color:var(--accent);font-weight:800;text-decoration:none;">Learn more</a>';
                }
                content.innerHTML = html;
                banner.style.display = 'block';
            } else {
                banner.style.display = 'none';
            }
        })
        .catch(function() {});
}
fetchAd();
setInterval(fetchAd, 120000);
</script>
{% block content %}{% endblock %}
</body></html>
